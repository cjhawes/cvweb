name: deploy-client-pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - src/CvWeb.Client/**
      - NuGet.Config
      - .github/workflows/deploy-client-pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Restore client
        run: dotnet restore src/CvWeb.Client/CvWeb.Client.csproj --configfile NuGet.Config

      - name: Publish client
        run: dotnet publish src/CvWeb.Client/CvWeb.Client.csproj --configuration Release --output release

      - name: Rewrite base href for project pages
        shell: bash
        run: |
          sed -i 's|<base href="/" />|<base href="/cvweb/" />|g' release/wwwroot/index.html

      - name: Add SPA fallback page
        shell: bash
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Add nojekyll marker
        shell: bash
        run: touch release/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    runs-on: ubuntu-latest
    needs: publish
    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
